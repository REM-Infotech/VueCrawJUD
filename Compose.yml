name: CrawJUD
services:
  api_rest:
    build:
      context: "."

    environment:
      SERVER_DEPLOYED: "True"
      DOCKER_HOSTNAME: "good_computers"
      API_REST_URL: "https://backend.reminfotech.net.br"
    ports:
      - "5001:5000"
    hostname: "good_computers"

    command: "poetry run python -m crawjud"

  front_end:
    image: "node:latest"

    build:
      context: "."
      dockerfile: vitepush.Dockerfile

    volumes:
      - ".:/app"

    ports:
      - "3001:3000"
    hostname: "stardust"
